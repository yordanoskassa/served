services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      SERVED_ENVIRONMENT: production
      SERVED_MONGODB_DB: served
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
